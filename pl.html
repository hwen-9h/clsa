<!DOCTYPE html>
<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-deep: #050505;
            --gold-primary: #D4AF37;
            --gold-gradient: linear-gradient(135deg, #F9E596 0%, #D4AF37 50%, #997A15 100%);
            --text-main: #F4F4F4;
            --text-muted: #A0A0A0;
            --glass-bg: rgba(15, 15, 15, 0.65);
            --glass-border: rgba(212, 175, 55, 0.25);
            --input-bg: rgba(255, 255, 255, 0.03);
            --input-border: rgba(255, 255, 255, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-deep); color: var(--text-main); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        #particle-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .login-wrapper { position: relative; z-index: 2; width: 100%; max-width: 450px; padding: 20px; animation: fadeIn 1s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .login-box { background: var(--glass-bg); backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 50px 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.8); text-align: center; position: relative; }
        .login-box::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 0%, rgba(212,175,55,0.15), transparent 60%); border-radius: 24px; pointer-events: none; }
        .logo img { width: 32%; margin-bottom: 10px; }
        h2 { font-size: 20px; font-weight: 500; color: var(--text-main); margin-bottom: 35px; }
        .input-group { position: relative; margin-bottom: 25px; text-align: left; }
        .input-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
        .input-group input { width: 100%; background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 12px; padding: 16px; color: var(--text-main); font-size: 15px; outline: none; transition: all 0.3s; }
        .input-group input:focus { border-color: var(--gold-primary); }
        .options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; font-size: 13px; }
        .remember-me { display: flex; align-items: center; gap: 8px; color: var(--text-muted); cursor: pointer; }
        .remember-me input[type="checkbox"] { appearance: none; width: 16px; height: 16px; border: 1px solid var(--text-muted); border-radius: 4px; background: transparent; cursor: pointer; transition: 0.2s; }
        .remember-me input[type="checkbox"]:checked { background: var(--gold-primary); border-color: var(--gold-primary); }
        .remember-me input[type="checkbox"]:checked::after { content: '✔'; position: absolute; color: #000; font-size: 10px; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .forgot-pass { color: var(--gold-primary); text-decoration: none; }
        .btn-login { width: 100%; background: var(--gold-gradient); color: #000; border: none; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 10px 20px rgba(212,175,55,0.2); transition: all 0.3s; }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(212,175,55,0.4); }
        .signup-link { display: block; margin-top: 25px; font-size: 14px; color: var(--text-muted); }
        .signup-link a { color: var(--gold-primary); text-decoration: none; font-weight: 600; }
    </style>
</head>
