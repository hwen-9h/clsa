<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXNYA | Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: #080b0f; color: #e6e9ef; font-family: 'DM Sans', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .login-box { background: #0d1117; border: 1px solid #1e2733; border-radius: 16px; padding: 40px 36px; width: 100%; max-width: 420px; }
        .logo { display: block; margin: 0 auto 30px; height: 42px; }
        h2 { font-family: 'Sora', sans-serif; font-size: 22px; font-weight: 600; text-align: center; margin-bottom: 24px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: #5e6a7a; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 12px 14px; background: #080b0f; border: 1px solid #1e2733; border-radius: 8px; color: #e6e9ef; font-size: 15px; outline: none; font-family: 'DM Sans', sans-serif; }
        .form-group input:focus { border-color: #fcd535; }
        .btn { width: 100%; padding: 13px; border: none; border-radius: 8px; font-weight: 600; font-size: 15px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: #fcd535; color: #000; }
        .btn-primary:hover { background: #e6c030; }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .error-msg { color: #f97387; font-size: 13px; margin-top: 8px; }
        .hidden { display: none; }
        .otp-note { color: #5e6a7a; font-size: 13px; text-align: center; margin: 16px 0; }
        .spinner { width:16px;height:16px;border:2px solid rgba(0,0,0,0.2);border-top-color:#000;border-radius:50%;animation:spin 0.7s linear infinite; }
        @keyframes spin { to{transform:rotate(360deg);} }
    </style>
</head>
<body>
    <div class="login-box">
        <img class="logo" src="./WhatsApp%20Image%202026-04-03%20at%204.24.59%20AM.jpeg" alt="EXNYA">
        <h2>Sign In to EXNYA</h2>

        <div id="step-password">
            <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="you@example.com" autocomplete="email"></div>
            <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="••••••••" autocomplete="current-password"></div>
            <button class="btn btn-primary" id="login-btn" onclick="handleLogin()">Sign In</button>
            <p class="error-msg" id="login-error"></p>
        </div>

        <div id="step-otp" class="hidden">
            <p class="otp-note">A verification code has been sent to <strong id="otp-email"></strong>. Enter it below.</p>
            <div class="form-group"><label>Verification Code</label><input type="text" id="otp-input" placeholder="000 000" maxlength="6" inputmode="numeric" autocomplete="one-time-code"></div>
            <button class="btn btn-primary" id="verify-btn" onclick="handleVerifyOTP()">Verify</button>
            <p class="error-msg" id="otp-error"></p>
            <button class="btn" style="background:transparent; color:#5e6a7a; margin-top:12px;" onclick="goBackToPassword()">← Back</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://clwgengvcdokdzubdfxd.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsd2dlbmd2Y2Rva2R6dWJkZnhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MTIxNjEsImV4cCI6MjA5MzQ4ODE2MX0.0zgizWWXLIHiKdNUAJ3yKaIaxEKsHoFeEIo8IUAMtHU';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ⚠️ REPLACE with your real EmailJS credentials
        const EMAILJS_SERVICE_ID = 'YOUR_SERVICE_ID';
        const EMAILJS_TEMPLATE_ID = 'YOUR_TEMPLATE_ID';
        const EMAILJS_PUBLIC_KEY = 'YOUR_PUBLIC_KEY';
        emailjs.init(EMAILJS_PUBLIC_KEY);

        let currentUser = null;
        function showError(id, msg) { document.getElementById(id).textContent = msg; }

        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            const errEl = document.getElementById('login-error');

            if (!email || !password) { showError('login-error', 'Please enter both email and password.'); return; }
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div> Signing in…';
            errEl.textContent = '';

            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) {
                showError('login-error', error.message);
                btn.disabled = false;
                btn.textContent = 'Sign In';
                return;
            }

            currentUser = data.user;
            const { data: profile, error: profileError } = await supabaseClient
                .from('profiles')
                .select('is_2fa_enabled')
                .eq('id', currentUser.id)
                .single();

            if (profileError && profileError.code !== 'PGRST116') {
                showError('login-error', 'Unable to load security settings.');
                btn.disabled = false;
                btn.textContent = 'Sign In';
                return;
            }

            const is2FA = profile?.is_2fa_enabled || false;
            if (!is2FA) {
                window.location.href = './profile.html';
            } else {
                document.getElementById('step-password').classList.add('hidden');
                document.getElementById('step-otp').classList.remove('hidden');
                document.getElementById('otp-email').textContent = email;
                const code = Math.floor(100000 + Math.random() * 900000).toString();
                // Store code in otp_codes table (explicit expiry)
                await supabaseClient.from('otp_codes').insert({
                    user_id: currentUser.id,
                    code: code,
                    expires_at: new Date(Date.now() + 10 * 60 * 1000).toISOString()
                });

                // Send email via EmailJS
                emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
                    code: code,
                    to_email: email
                }).catch(err => {
                    showError('otp-error', 'Failed to send email: ' + err.text);
                });

                document.getElementById('otp-input').focus();
            }
        }

        async function handleVerifyOTP() {
            const code = document.getElementById('otp-input').value.replace(/\D/g, '');
            const btn = document.getElementById('verify-btn');
            const errEl = document.getElementById('otp-error');

            if (code.length !== 6) { showError('otp-error', 'Enter the 6‑digit code.'); return; }
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div> Verifying…';
            errEl.textContent = '';

            const { data: otpRecord, error } = await supabaseClient
                .from('otp_codes')
                .select('code, expires_at')
                .eq('user_id', currentUser.id)
                .eq('code', code)
                .gte('expires_at', new Date().toISOString())
                .order('created_at', { ascending: false })
                .limit(1)
                .single();

            if (error || !otpRecord) {
                showError('otp-error', 'Invalid or expired code.');
                btn.disabled = false;
                btn.textContent = 'Verify';
                return;
            }
            // Delete used code
            await supabaseClient.from('otp_codes').delete().eq('user_id', currentUser.id).eq('code', code);
            window.location.href = './profile.html';
        }

        function goBackToPassword() {
            document.getElementById('step-otp').classList.add('hidden');
            document.getElementById('step-password').classList.remove('hidden');
            document.getElementById('otp-error').textContent = '';
        }

        // Auto-check existing session (force 2FA if enabled)
        (async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                const { data: profile } = await supabaseClient
                    .from('profiles')
                    .select('is_2fa_enabled')
                    .eq('id', session.user.id)
                    .single();
                if (!profile?.is_2fa_enabled) window.location.href = './profile.html';
                else {
                    currentUser = session.user;
                    document.getElementById('step-password').classList.add('hidden');
                    document.getElementById('step-otp').classList.remove('hidden');
                    document.getElementById('otp-email').textContent = session.user.email;
                    const code = Math.floor(100000 + Math.random() * 900000).toString();
                    await supabaseClient.from('otp_codes').insert({
                        user_id: currentUser.id,
                        code: code,
                        expires_at: new Date(Date.now() + 10 * 60 * 1000).toISOString()
                    });
                    emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
                        code: code,
                        to_email: session.user.email
                    }).catch(err => {});
                    document.getElementById('otp-input').focus();
                }
            }
        })();
    </script>
</body>
</html>
