<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXNYA | P2P Trading</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Sora:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ---------- Bybit P2P Dark Theme ---------- */
        :root {
            --bg-base: #0b0e11;
            --bg-elevated: #1e2329;
            --bg-hover: #2a2f36;
            --brand-yellow: #f0b90b;
            --brand-yellow-dim: rgba(240, 185, 11, 0.1);
            --text-primary: #eaecef;
            --text-secondary: #848e9c;
            --text-muted: #5e6673;
            --border-light: #2b3139;
            --border-subtle: #1e2329;
            --trade-green: #0ecb81;
            --trade-red: #f6465d;
            --sidebar-width: 240px;
            --sidebar-collapsed-width: 64px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-base);
            color: var(--text-primary);
            display: flex;
            min-height: 100vh;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            -webkit-font-smoothing: antialiased;
        }

        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.3;
        }

        .app-container {
            position: relative;
            z-index: 1;
            display: flex;
            width: 100%;
        }

        /* ---------- Sidebar (same as all pages) ---------- */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-elevated);
            border-right: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            transition: width 0.3s;
            overflow: hidden;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .sidebar.collapsed {
            width: var(--sidebar-collapsed-width);
        }

        .sidebar-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 22px 0 18px;
            cursor: pointer;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-light);
        }

        .sidebar-toggle svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .sidebar-toggle:hover {
            color: var(--brand-yellow);
        }

        .sidebar-nav {
            flex: 1;
            padding: 16px 10px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 11px;
            padding: 10px 14px;
            border-radius: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13.5px;
            font-weight: 500;
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
        }

        .sidebar.collapsed .sidebar-nav a {
            padding: 12px 0;
            justify-content: center;
            gap: 0;
        }

        .sidebar.collapsed .sidebar-nav a .nav-text {
            display: none;
        }

        .sidebar.collapsed .sidebar-nav a .nav-icon svg {
            width: 20px;
            height: 20px;
        }

        .sidebar-nav a:hover,
        .sidebar-nav a.active {
            background: var(--brand-yellow-dim);
            color: var(--brand-yellow);
        }

        .sidebar-nav a .nav-icon {
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }

        .sidebar-nav a .nav-icon svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .sidebar-footer {
            padding: 12px 10px;
            border-top: 1px solid var(--border-light);
        }

        .mobile-toggle {
            display: none;
            position: fixed;
            top: 14px;
            left: 14px;
            z-index: 110;
            width: 38px;
            height: 38px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-light);
            border-radius: 7px;
            color: var(--text-secondary);
            cursor: pointer;
            align-items: center;
            justify-content: center;
        }

        .mobile-toggle:hover {
            color: var(--brand-yellow);
            border-color: var(--brand-yellow);
        }

        @media (max-width:768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 100;
                box-shadow: 8px 0 32px rgba(0, 0, 0, 0.6);
            }

            .sidebar.collapsed {
                width: 0;
            }

            .mobile-toggle {
                display: flex;
            }

            .sidebar:not(.collapsed)~.mobile-toggle {
                display: none;
            }

            .main-content {
                padding: 20px 16px;
            }
        }

        /* ---------- Main Content ---------- */
        .main-content {
            flex: 1;
            padding: 28px 32px;
            overflow-y: auto;
            max-width: 1400px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .left-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 16px;
        }

        .top-logo {
            height: 34px;
            width: auto;
        }

        .user-info-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--brand-yellow) 0%, #c9920a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Sora', sans-serif;
            font-weight: 700;
            font-size: 17px;
            color: #000;
            flex-shrink: 0;
        }

        .user-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .profile-name {
            font-family: 'Sora', sans-serif;
            font-weight: 600;
            font-size: 15px;
            color: var(--text-primary);
        }

        .user-email {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .right-group {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-top: 4px;
        }

        .logout-btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--text-secondary);
            padding: 7px 16px;
            border-radius: 7px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: border-color 0.2s, color 0.2s;
        }

        .logout-btn svg {
            width: 13px;
            height: 13px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .logout-btn:hover {
            border-color: var(--trade-red);
            color: var(--trade-red);
        }

        /* ---------- P2P Specific Styles ---------- */
        .p2p-container {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .p2p-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .p2p-header h1 {
            font-family: 'Sora', sans-serif;
            font-size: 24px;
            font-weight: 700;
        }

        .tabs {
            display: flex;
            gap: 8px;
            background: var(--bg-elevated);
            padding: 4px;
            border-radius: 8px;
            width: fit-content;
        }

        .tab {
            padding: 10px 24px;
            background: transparent;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .tab.active {
            background: var(--brand-yellow-dim);
            color: var(--brand-yellow);
        }

        .tab:hover {
            color: var(--text-primary);
        }

        .filter-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 8px;
        }

        .filter-bar select,
        .filter-bar input {
            background: var(--bg-elevated);
            border: 1px solid var(--border-light);
            border-radius: 6px;
            padding: 10px 14px;
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
            font-family: 'DM Sans', sans-serif;
        }

        .filter-bar select:focus,
        .filter-bar input:focus {
            border-color: var(--brand-yellow);
        }

        .filter-bar .btn {
            padding: 10px 20px;
            font-weight: 600;
        }

        .ad-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .ad-item {
            background: var(--bg-elevated);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            transition: background 0.2s;
        }

        .ad-item:hover {
            background: var(--bg-hover);
        }

        .ad-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
            min-width: 0;
        }

        .ad-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--brand-yellow-dim);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--brand-yellow);
            flex-shrink: 0;
        }

        .ad-user-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .ad-username {
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .merchant-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--brand-yellow), #c9920a);
            color: #000;
            font-size: 10px;
            font-weight: 700;
            padding: 1px 6px;
            border-radius: 4px;
        }

        .ad-stats {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-muted);
        }

        .ad-price {
            font-family: 'JetBrains Mono', monospace;
            font-size: 20px;
            font-weight: 600;
            color: var(--brand-yellow);
            white-space: nowrap;
        }

        .ad-middle {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .ad-label {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        .ad-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }

        .ad-value.available {
            color: var(--trade-green);
        }

        .ad-value.limit {
            color: var(--text-secondary);
        }

        .ad-right {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .ad-payment {
            background: var(--bg-hover);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--brand-yellow);
            color: #000;
        }

        .btn-primary:hover {
            background: #e6a800;
        }

        .btn-danger {
            background: var(--trade-red);
            color: #fff;
        }

        .btn-danger:hover {
            background: #e03e50;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--text-secondary);
        }

        .btn-outline:hover {
            border-color: var(--brand-yellow);
            color: var(--text-primary);
        }

        .btn-success {
            background: var(--trade-green);
            color: #000;
        }

        .btn-success:hover {
            background: #0bb76e;
        }

        .kyc-warning {
            background: rgba(246, 70, 93, 0.1);
            border: 1px solid rgba(246, 70, 93, 0.2);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--trade-red);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .kyc-warning a {
            color: var(--brand-yellow);
            font-weight: 600;
        }

        .status-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-open {
            background: rgba(14, 203, 129, 0.1);
            color: var(--trade-green);
        }

        .status-matched {
            background: rgba(240, 185, 11, 0.1);
            color: var(--brand-yellow);
        }

        .status-escrowed {
            background: rgba(240, 185, 11, 0.15);
            color: var(--brand-yellow);
        }

        .status-paid {
            background: rgba(14, 203, 129, 0.15);
            color: var(--trade-green);
        }

        .status-completed {
            background: rgba(14, 203, 129, 0.2);
            color: var(--trade-green);
        }

        .status-disputed {
            background: rgba(246, 70, 93, 0.15);
            color: var(--trade-red);
        }

        .status-cancelled {
            background: rgba(132, 142, 156, 0.1);
            color: var(--text-muted);
        }

        .create-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 420px;
            background: var(--bg-elevated);
            padding: 24px;
            border-radius: 8px;
            border: 1px solid var(--border-light);
        }

        .create-form h3 {
            font-family: 'Sora', sans-serif;
            margin-bottom: 8px;
        }

        .create-form select,
        .create-form input {
            background: var(--bg-base);
            border: 1px solid var(--border-light);
            border-radius: 6px;
            padding: 12px 14px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            font-family: 'DM Sans', sans-serif;
        }

        .create-form input:focus,
        .create-form select:focus {
            border-color: var(--brand-yellow);
        }

        .create-form .row {
            display: flex;
            gap: 12px;
        }

        .create-form .row>* {
            flex: 1;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal {
            background: var(--bg-elevated);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 28px 24px;
            width: 90%;
            max-width: 420px;
            text-align: center;
        }

        .modal h3 {
            font-family: 'Sora', sans-serif;
            font-size: 18px;
            margin-bottom: 16px;
        }

        .modal p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .modal .btn-row {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
    </style>
</head>

    <canvas id="particle-canvas"></canvas>
    <div class="app-container">
        <!-- Sidebar (identical to all other pages) -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-toggle" onclick="toggleSidebar()"><svg viewBox="0 0 24 24">
                    <line x1="3" y1="6" x2="21" y2="6" />

                            <polyline points="16 7 22 7 22 13" />
                        </svg></span><span class="nav-text">Live Portfolio</span></a>
                <a href="./markets.html"><span class="nav-icon"><svg viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="10" />
                            <line x1="2" y1="12" x2="22" y2="12" />

            </nav>
            <div class="sidebar-footer"></div>
        </aside>
        <div class="mobile-toggle" id="mobile-toggle" onclick="toggleSidebar()"><svg width="18" height="18"
                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="6" x2="21" y2="6" />
                <line x1="3" y1="12" x2="21" y2="12" />
                <line x1="3" y1="18" x2="21" y2="18" />
            </svg></div>

        <!-- P2P Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <div class="left-group">
                    <img class="top-logo" src="./WhatsApp%20Image%202026-04-03%20at%204.24.59%20AM.jpeg" alt="EXNYA">
                    <div class="user-info-row">
                        <div class="avatar" id="user-initials">U</div>
                        <div class="user-text">
                            <div class="profile-name" id="user-fullname">Loading...</div>

            <div class="p2p-container">
                <div class="p2p-header">
                    <h1>P2P Trading</h1>
                    <div class="tabs" id="tabs">
                        <button class="tab active" onclick="switchTab('buy')">Buy</button>
                        <button class="tab" onclick="switchTab('sell')">Sell</button>
                        <button class="tab" onclick="switchTab('my-orders')">My Orders</button>
                        <button class="tab" onclick="switchTab('create')">Create Ad</button>
                    </div>

                <div id="kyc-warning" class="kyc-warning" style="display:none;">
                    ⚠️ You must complete identity verification to trade. <a href="./profile.html">Verify now</a>
                </div>

                <!-- Filter bar (visible on Buy/Sell tabs) -->
                <div id="filter-bar" class="filter-bar" style="display:none;">
                    <select id="filter-coin">
                        <option value="">All Coins</option>
                        <option value="BTC">BTC</option>
                        <option value="ETH">ETH</option>
                        <option value="USDT">USDT</option>
                    </select>
                    <select id="filter-payment">
                        <option value="">All Payments</option>
                        <option value="Bank Transfer (NGN)">Bank Transfer</option>

                        <option value="PayPal">PayPal</option>
                    </select>
                    <input type="number" id="filter-amount" placeholder="Min amount (USD)" style="width:140px;">
                    <button class="btn btn-primary" onclick="applyFilters()">Search</button>
                </div>

                <div id="tab-content"><!-- dynamic --></div>
            </div>
        </main>
    </div>

    <!-- Confirm Trade Modal -->
    <div class="modal-overlay" id="trade-modal">
        <div class="modal">
            <h3>Confirm Trade</h3>
            <p id="trade-details"></p>
            <div class="btn-row">
                <button class="btn btn-outline" onclick="closeTradeModal()">Cancel</button>
                <button class="btn btn-primary" id="confirm-trade-btn">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://clwgengvcdokdzubdfxd.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsd2dlbmd2Y2Rva2R6dWJkZnhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MTIxNjEsImV4cCI6MjA5MzQ4ODE2MX0.0zgizWWXLIHiKdNUAJ3yKaIaxEKsHoFeEIo8IUAMtHU';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;
        let currentProfile = null;
        let currentTab = 'buy';
        let allTrades = [];
        let userProfiles = {};

        // Sidebar & particles (minimal)
        const sidebar = document.getElementById('sidebar');
        if (localStorage.getItem('sidebarCollapsed') === 'true') sidebar.classList.add('collapsed');
        function toggleSidebar() { sidebar.classList.toggle('collapsed'); localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed')); }
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray = []; const numParticles = 60;
        function setCanvasSize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        setCanvasSize(); window.addEventListener('resize', setCanvasSize);
        class Particle {
            constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.size = Math.random() * 1.5 + 0.2; this.speedX = (Math.random() * 0.4) - 0.2; this.speedY = (Math.random() * 0.4) - 0.2; }
            update() { this.x += this.speedX; this.y += this.speedY; if (this.x < 0) this.x = canvas.width; if (this.x > canvas.width) this.x = 0; if (this.y < 0) this.y = canvas.height; if (this.y > canvas.height) this.y = 0; }
            draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fillStyle = '#D4AF37'; ctx.shadowBlur = 6; ctx.shadowColor = '#D4AF37'; ctx.fill(); }
        }
        function initParticles() { particlesArray = []; for (let i = 0; i < numParticles; i++) particlesArray.push(new Particle()); }
        function animateParticles() { ctx.clearRect(0, 0, canvas.width, canvas.height); for (let i = 0; i < particlesArray.length; i++) { particlesArray[i].update(); particlesArray[i].draw(); for (let j = i + 1; j < particlesArray.length; j++) { const dx = particlesArray[i].x - particlesArray[j].x; const dy = particlesArray[i].y - particlesArray[j].y; const distance = Math.sqrt(dx * dx + dy * dy); if (distance < 110) { ctx.beginPath(); ctx.strokeStyle = `rgba(212,175,55,${0.1 - distance / 700})`; ctx.lineWidth = 0.4; ctx.shadowBlur = 0; ctx.moveTo(particlesArray[i].x, particlesArray[i].y); ctx.lineTo(particlesArray[j].x, particlesArray[j].y); ctx.stroke(); } } } requestAnimationFrame(animateParticles); }
        initParticles(); animateParticles();

        async function init() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) { window.location.href = './pl.html'; return; }
            currentUser = session.user;
            document.getElementById('user-initials').textContent = (currentUser.email[0] || 'U').toUpperCase();
            document.getElementById('user-fullname').textContent = currentUser.email;
            document.getElementById('user-email-display').textContent = currentUser.email;

            const { data: profile } = await supabaseClient.from('profiles').select('kyc_status,merchant,completed_trades_count,first_name').eq('id', currentUser.id).single();
            currentProfile = profile || { kyc_status: 'unverified', merchant: false, completed_trades_count: 0 };

            if (currentProfile.kyc_status !== 'verified') {
                document.getElementById('kyc-warning').style.display = 'flex';
            }

            await loadTrades();
            renderTab();
        }

        async function loadTrades() {
            const { data, error } = await supabaseClient.from('p2p_trades').select('*').order('created_at', { ascending: false });
            if (!error) allTrades = data;

            // Cache profiles for ad owners
            const openAds = allTrades.filter(t => t.status === 'open');
            const userIds = [...new Set(openAds.map(t => t.user_id))];
            if (userIds.length > 0) {
                const { data: profiles } = await supabaseClient.from('profiles').select('id,first_name,merchant,completed_trades_count').in('id', userIds);
                if (profiles) profiles.forEach(p => userProfiles[p.id] = p);
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');

            // Show/hide filter bar
            document.getElementById('filter-bar').style.display = (tab === 'buy' || tab === 'sell') ? 'flex' : 'none';
            renderTab();
        }

        function applyFilters() {
            renderTab(); // reload with current filters
        }

        function renderTab() {
            const container = document.getElementById('tab-content');
            if (currentTab === 'buy' || currentTab === 'sell') {
                const filterType = currentTab;
                const oppositeType = filterType === 'buy' ? 'sell' : 'buy';
                const coinFilter = document.getElementById('filter-coin')?.value || '';
                const paymentFilter = document.getElementById('filter-payment')?.value || '';
                const minAmount = parseFloat(document.getElementById('filter-amount')?.value) || 0;

                let ads = allTrades.filter(t => t.status === 'open' && t.type === oppositeType);
                if (coinFilter) ads = ads.filter(t => t.asset_symbol === coinFilter);
                if (paymentFilter) ads = ads.filter(t => t.payment_method === paymentFilter);
                if (minAmount > 0) ads = ads.filter(t => parseFloat(t.amount) >= minAmount);

                let html = '';
                if (ads.length === 0) {
                    html = `<p style="color:var(--text-muted); padding:32px; text-align:center;">No ${oppositeType} ads found. <button class="btn btn-primary" onclick="switchTab('create')">Create one</button></p>`;
                } else {
                    ads.forEach(ad => {
                        const owner = userProfiles[ad.user_id] || {};
                        const name = owner.first_name || 'User';
                        const merchant = owner.merchant ? '<span class="merchant-badge">MERCHANT</span>' : '';
                        const tradesCount = owner.completed_trades_count || 0;
                        const isOwn = ad.user_id === currentUser.id;

                        html += `
                        <div class="ad-item">
                            <div class="ad-left">
                                <div class="ad-avatar">${name[0]?.toUpperCase()}</div>
                                <div class="ad-user-info">
                                    <div class="ad-username">${name} ${merchant}</div>
                                    <div class="ad-stats">${tradesCount} trades</div>
                                </div>
                            </div>
                            <div class="ad-price">$${parseFloat(ad.price).toFixed(2)}</div>
                            <div class="ad-middle">
                                <div class="ad-label">Available</div>
                                <div class="ad-value available">${ad.amount} ${ad.asset_symbol}</div>
                            </div>
                            <div class="ad-middle">
                                <div class="ad-label">Limit</div>
                                <div class="ad-value limit">--</div>
                            </div>
                            <div class="ad-payment">${ad.payment_method}</div>
                            <div class="ad-right">
                                ${!isOwn && currentProfile.kyc_status === 'verified' ? `<button class="btn btn-primary" onclick="confirmTrade('${ad.id}')">${filterType === 'buy' ? 'Buy' : 'Sell'}</button>` : ''}
                                ${isOwn ? `<button class="btn btn-outline" onclick="cancelTrade('${ad.id}')">Remove</button>` : ''}
                            </div>
                        </div>`;
                    });
                }
                container.innerHTML = html;
            } else if (currentTab === 'my-orders') {
                const myTrades = allTrades.filter(t => t.user_id === currentUser.id || t.matched_user_id === currentUser.id);
                let html = '';
                if (myTrades.length === 0) {
                    html = '<p style="color:var(--text-muted); padding:32px; text-align:center;">No orders yet.</p>';
                } else {
                    myTrades.forEach(trade => {
                        const statusClass = `status-${trade.status}`;
                        let actions = '';
                        if (trade.status === 'matched' && trade.user_id === currentUser.id) {
                            actions += `<button class="btn btn-primary" onclick="escrowTrade('${trade.id}')">Escrow</button>`;
                        }
                        if (trade.status === 'escrowed' && trade.matched_user_id === currentUser.id) {
                            actions += `<button class="btn btn-success" onclick="confirmPayment('${trade.id}')">I've Paid</button>`;
                        }
                        if (trade.status === 'paid' && trade.user_id === currentUser.id) {
                            actions += `<button class="btn btn-success" onclick="releaseTrade('${trade.id}')">Release</button>`;
                        }
                        if (['matched', 'escrowed', 'paid'].includes(trade.status)) {
                            actions += `<button class="btn btn-danger" onclick="disputeTrade('${trade.id}')">Dispute</button>`;
                        }
                        if (trade.status === 'open' && trade.user_id === currentUser.id) {
                            actions += `<button class="btn btn-outline" onclick="cancelTrade('${trade.id}')">Cancel</button>`;
                        }
                        html += `
                        <div class="ad-item">
                            <div style="display:flex;align-items:center;gap:12px;flex:1;">
                                <span class="status-badge ${statusClass}">${trade.status}</span>
                                <span style="font-weight:600;">${trade.type.toUpperCase()} ${trade.asset_symbol}</span>
                                <span style="font-family:'JetBrains Mono';font-size:13px;">${trade.amount} @ $${trade.price}</span>
                                <span style="color:var(--text-secondary);">${trade.payment_method}</span>
                            </div>
                            <div class="ad-right">${actions}</div>
                        </div>`;
                    });
                }
                container.innerHTML = html;
            } else if (currentTab === 'create') {
                if (currentProfile.kyc_status !== 'verified') {
                    container.innerHTML = '<p style="color:var(--trade-red); padding:32px; text-align:center;">Complete KYC verification to create ads.</p>';
                    return;
                }
                container.innerHTML = `
                <div class="create-form">
                    <h3>Create New Ad</h3>
                    <select id="order-type"><option value="buy">Buy</option><option value="sell">Sell</option></select>
                    <select id="order-coin"><option value="BTC">BTC</option><option value="ETH">ETH</option><option value="USDT">USDT</option></select>
                    <div class="row">
                        <input type="number" id="order-amount" placeholder="Amount" step="any">
                        <input type="number" id="order-price" placeholder="Price per coin (USD)" step="any">
                    </div>
                    <select id="order-payment">
                        <option value="Bank Transfer (NGN)">Bank Transfer (NGN)</option>
                        <option value="Mobile Money">Mobile Money</option>
                        <option value="PayPal">PayPal</option>
                    </select>
                    <button class="btn btn-primary" onclick="createOrder()" style="width:100%;">Post Ad</button>
                </div>`;
            }
        }

        async function confirmTrade(adId) {
            const ad = allTrades.find(t => t.id === adId);
            if (!ad) return;
            document.getElementById('trade-details').innerHTML = `
                <b>${ad.type.toUpperCase()} ${ad.amount} ${ad.asset_symbol}</b><br>
                Price: $${parseFloat(ad.price).toFixed(2)}/coin<br>
                Total: $${parseFloat(ad.total).toFixed(2)}<br>
                Payment: ${ad.payment_method}
            `;
            document.getElementById('trade-modal').style.display = 'flex';
            document.getElementById('confirm-trade-btn').onclick = async () => {
                closeTradeModal();
                await supabaseClient.from('p2p_trades').update({
                    matched_user_id: currentUser.id,
                    status: 'matched'
                }).eq('id', adId);
                await loadTrades();
                renderTab();
            };
        }

        function closeTradeModal() { document.getElementById('trade-modal').style.display = 'none'; }

        async function createOrder() {
            const type = document.getElementById('order-type').value;
            const symbol = document.getElementById('order-coin').value;
            const amount = parseFloat(document.getElementById('order-amount').value);
            const price = parseFloat(document.getElementById('order-price').value);
            const payment = document.getElementById('order-payment').value;
            if (!amount || !price || amount <= 0 || price <= 0) { alert('Enter valid amount and price.'); return; }
            const total = amount * price;
            const { error } = await supabaseClient.from('p2p_trades').insert({
                user_id: currentUser.id,
                type, asset_symbol: symbol,
                amount, price, total,
                payment_method: payment,
                status: 'open'
            });
            if (error) alert('Failed to create ad: ' + error.message);
            else { await loadTrades(); switchTab(type); }
        }

        async function escrowTrade(id) { await supabaseClient.from('p2p_trades').update({ status: 'escrowed' }).eq('id', id); await loadTrades(); renderTab(); }
        async function confirmPayment(id) { await supabaseClient.from('p2p_trades').update({ status: 'paid' }).eq('id', id); await loadTrades(); renderTab(); }
        async function releaseTrade(id) {
            const trade = allTrades.find(t => t.id === id);
            if (!trade) return;
            await supabaseClient.from('p2p_trades').update({ status: 'completed' }).eq('id', id);
            // Increment completed trades for both parties
            for (const uid of [trade.user_id, trade.matched_user_id]) {
                if (!uid) continue;
                const { data: p } = await supabaseClient.from('profiles').select('completed_trades_count').eq('id', uid).single();
                const newCount = (p?.completed_trades_count || 0) + 1;
                await supabaseClient.from('profiles').update({ completed_trades_count: newCount, merchant: newCount >= 5 }).eq('id', uid);
            }
            await loadTrades(); renderTab();
        }
        async function disputeTrade(id) { await supabaseClient.from('p2p_trades').update({ status: 'disputed' }).eq('id', id); await loadTrades(); renderTab(); }
        async function cancelTrade(id) { await supabaseClient.from('p2p_trades').update({ status: 'cancelled' }).eq('id', id); await loadTrades(); renderTab(); }

        function logout() { supabaseClient.auth.signOut().then(() => window.location.href = './pl.html'); }

        init();
    </script>
</body>

</html>
