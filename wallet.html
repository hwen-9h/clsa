<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXNYA | Wallet</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Sora:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-base: #080b0f; --bg-elevated: #0d1117; --bg-hover: #161c25;
            --brand-yellow: #fcd535; --brand-yellow-dim: rgba(252,213,53,0.08);
            --text-primary: #e6e9ef; --text-secondary: #5e6a7a; --text-muted: #3a4554;
            --border-light: #1e2733; --border-subtle: #151d27;
            --trade-green: #0ecb81; --trade-red: #f6465d;
            --sidebar-width: 240px; --sidebar-collapsed-width: 64px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg-base); color:var(--text-primary); display:flex; min-height:100vh; font-family:'DM Sans',sans-serif; font-size:14px; -webkit-font-smoothing:antialiased; }
        #particle-canvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; opacity:0.45; }
        .app-container { position:relative; z-index:1; display:flex; width:100%; }

        .sidebar { width:var(--sidebar-width); background:var(--bg-elevated); border-right:1px solid var(--border-light); display:flex; flex-direction:column; transition:width 0.3s; overflow:hidden; white-space:nowrap; flex-shrink:0; }
        .sidebar.collapsed { width:var(--sidebar-collapsed-width); }
        .sidebar-toggle { display:flex; align-items:center; justify-content:center; width:100%; padding:22px 0 18px; cursor:pointer; color:var(--text-muted); border-bottom:1px solid var(--border-light); }
        .sidebar-toggle svg { width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
        .sidebar-toggle:hover { color:var(--brand-yellow); }
        .sidebar-nav { flex:1; padding:16px 10px; display:flex; flex-direction:column; gap:2px; }
        .sidebar-nav a { display:flex; align-items:center; gap:11px; padding:10px 14px; border-radius:8px; color:var(--text-secondary); text-decoration:none; font-size:13.5px; font-weight:500; transition:background 0.15s,color 0.15s; white-space:nowrap; }
        .sidebar.collapsed .sidebar-nav a { padding:12px 0; justify-content:center; gap:0; }
        .sidebar.collapsed .sidebar-nav a .nav-text { display:none; }
        .sidebar.collapsed .sidebar-nav a .nav-icon svg { width:20px; height:20px; }
        .sidebar-nav a:hover, .sidebar-nav a.active { background:var(--brand-yellow-dim); color:var(--brand-yellow); }
        .sidebar-nav a .nav-icon { display:flex; align-items:center; flex-shrink:0; }
        .sidebar-nav a .nav-icon svg { width:16px; height:16px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
        .sidebar-footer { padding:12px 10px; border-top:1px solid var(--border-light); }

        .mobile-toggle { display:none; position:fixed; top:14px; left:14px; z-index:110; width:38px; height:38px; background:var(--bg-elevated); border:1px solid var(--border-light); border-radius:7px; color:var(--text-secondary); cursor:pointer; align-items:center; justify-content:center; }
        .mobile-toggle:hover { color:var(--brand-yellow); border-color:var(--brand-yellow); }
        @media (max-width:768px) {
            .sidebar { position:fixed; left:0; top:0; bottom:0; z-index:100; box-shadow:8px 0 32px rgba(0,0,0,0.6); }
            .sidebar.collapsed { width:0; }
            .mobile-toggle { display:flex; }
            .sidebar:not(.collapsed) ~ .mobile-toggle { display:none; }
            .main-content { padding:20px 16px; }
        }

        .main-content { flex:1; padding:28px 32px; overflow-y:auto; max-width:1000px; }
        .top-bar { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:32px; flex-wrap:wrap; gap:16px; }
        .left-group { display:flex; flex-direction:column; align-items:flex-start; gap:16px; }
        .top-logo { height:34px; width:auto; }
        .user-info-row { display:flex; align-items:center; gap:12px; }
        .avatar { width:42px; height:42px; border-radius:10px; background:linear-gradient(135deg,var(--brand-yellow) 0%,#c9920a 100%); display:flex; align-items:center; justify-content:center; font-family:'Sora',sans-serif; font-weight:700; font-size:17px; color:#000; flex-shrink:0; }
        .user-text { display:flex; flex-direction:column; gap:2px; }
        .profile-name { font-family:'Sora',sans-serif; font-weight:600; font-size:15px; color:var(--text-primary); }
        .user-email { color:var(--text-secondary); font-size:12px; }
        .right-group { display:flex; align-items:center; gap:12px; padding-top:4px; }
        .logout-btn { display:inline-flex; align-items:center; gap:7px; background:transparent; border:1px solid var(--border-light); color:var(--text-secondary); padding:7px 16px; border-radius:7px; cursor:pointer; font-size:13px; font-weight:500; transition:border-color 0.2s,color 0.2s; }
        .logout-btn svg { width:13px; height:13px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
        .logout-btn:hover { border-color:var(--trade-red); color:var(--trade-red); }

        .balance-card { background:var(--bg-elevated); border:1px solid var(--border-light); border-radius:16px; padding:28px 28px 24px; margin-bottom:24px; }
        .balance-label { font-size:13px; color:var(--text-secondary); margin-bottom:4px; }
        .balance-amount { font-family:'Sora',sans-serif; font-size:40px; font-weight:700; letter-spacing:-0.5px; color:var(--text-primary); margin-bottom:6px; }
        .balance-btc { font-family:'JetBrains Mono',monospace; font-size:16px; color:var(--text-secondary); margin-bottom:24px; }
        .action-buttons { display:flex; gap:12px; }
        .btn-action { flex:1; padding:12px 20px; border-radius:10px; font-weight:600; font-size:14px; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:8px; border:1px solid transparent; }
        .btn-action.deposit { background:var(--trade-green); color:#000; border-color:var(--trade-green); }
        .btn-action.withdraw { background:transparent; border:1px solid var(--border-light); color:var(--text-primary); }
        .btn-action.transfer { background:transparent; border:1px solid var(--border-light); color:var(--text-primary); }
        .btn-action:hover { transform:translateY(-1px); box-shadow:0 8px 20px rgba(0,0,0,0.3); }
        .btn-action.withdraw:hover, .btn-action.transfer:hover { border-color:var(--brand-yellow); color:var(--brand-yellow); }

        .trends-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        .trends-header h2 { font-family:'Sora',sans-serif; font-size:16px; font-weight:600; display:flex; align-items:center; gap:8px; color:var(--text-primary); }
        .trends-header a { font-size:13px; color:var(--brand-yellow); text-decoration:none; font-weight:500; }
        .trends-grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:16px; }
        .trend-card { background:var(--bg-elevated); border:1px solid var(--border-light); border-radius:14px; padding:20px; transition:background 0.2s; }
        .trend-card:hover { background:var(--bg-hover); }
        .trend-card .coin { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
        .coin-icon { width:36px; height:36px; border-radius:50%; background:var(--bg-base); display:flex; align-items:center; justify-content:center; font-weight:600; font-size:16px; flex-shrink:0; }
        .coin-name { font-family:'Sora',sans-serif; font-size:16px; font-weight:600; }
        .trend-price { font-family:'JetBrains Mono',monospace; font-size:18px; font-weight:500; margin-bottom:4px; }
        .trend-change { font-family:'JetBrains Mono',monospace; font-size:14px; }
        .positive { color:var(--trade-green); }
        .negative { color:var(--trade-red); }

        @media (max-width:768px) { .trends-grid { grid-template-columns:1fr; } .action-buttons { flex-direction:column; } }

        .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; display:none; justify-content:center; align-items:center; }
        .modal { background:var(--bg-elevated); border:1px solid var(--border-light); border-radius:14px; padding:28px 24px; width:90%; max-width:420px; text-align:center; }
        .modal h3 { font-family:'Sora',sans-serif; font-size:16px; margin-bottom:16px; }
        .modal p { color:var(--text-secondary); font-size:13px; margin-bottom:16px; }
        .modal input { width:100%; background:var(--bg-base); border:1px solid var(--border-light); border-radius:8px; padding:10px; color:var(--text-primary); font-size:14px; outline:none; font-family:'JetBrains Mono',monospace; text-align:center; margin-bottom:12px; }
        .modal .address-box { background:var(--bg-base); border:1px solid var(--border-light); border-radius:8px; padding:12px 16px; font-family:'JetBrains Mono',monospace; font-size:12px; word-break:break-all; margin-bottom:12px; }
        .modal .btn-row { display:flex; gap:10px; justify-content:center; margin-top:16px; }
        .btn { padding:6px 16px; border:none; border-radius:7px; font-weight:600; font-size:12px; cursor:pointer; }
        .btn-deposit { background:var(--trade-green); color:#000; }
        .btn-deposit:hover { background:#0bb76e; }
        .btn-withdraw-modal { background:var(--brand-yellow); color:#000; }
        .btn-withdraw-modal:hover { background:#e6c030; }
        .btn-outline { background:transparent; border:1px solid var(--border-light); color:var(--text-secondary); }
        .btn-outline:hover { border-color:var(--brand-yellow); color:var(--text-primary); }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-toggle" onclick="toggleSidebar()"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></div>
            <nav class="sidebar-nav">
                <a href="./profile.html"><span class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span><span class="nav-text">Overview</span></a>
                <a href="#" class="active"><span class="nav-icon"><svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M12 9v4M10 11h4"/></svg></span><span class="nav-text">Wallet</span></a>
                <a href="./live-portfolio.html"><span class="nav-icon"><svg viewBox="0 0 24 24"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg></span><span class="nav-text">Live Portfolio</span></a>
                <a href="./markets.html"><span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></span><span class="nav-text">Markets</span></a>
                <a href="./swap.html"><span class="nav-icon"><svg viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg></span><span class="nav-text">Swap</span></a>
                <a href="./news.html"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/></svg></span><span class="nav-text">News</span></a>
                <a href="./security.html"><span class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span><span class="nav-text">Security</span></a>
            </nav>
            <div class="sidebar-footer"></div>
        </aside>
        <div class="mobile-toggle" id="mobile-toggle" onclick="toggleSidebar()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></div>

        <main class="main-content">
            <div class="top-bar">
                <div class="left-group">
                    <img class="top-logo" src="./WhatsApp%20Image%202026-04-03%20at%204.24.59%20AM.jpeg" alt="EXNYA">
                    <div class="user-info-row">
                        <div class="avatar" id="user-initials">U</div>
                        <div class="user-text">
                            <div class="profile-name" id="user-fullname">Loading...</div>
                            <div class="user-email" id="user-email-display">--</div>
                        </div>
                    </div>
                </div>
                <div class="right-group">
                    <button class="logout-btn" onclick="logout()"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Sign Out</button>
                </div>
            </div>

            <div class="balance-card">
                <div class="balance-label">Total Balance</div>
                <div class="balance-amount" id="total-balance">$0.00</div>
                <div class="balance-btc" id="btc-holdings">0.00 BTC</div>
                <div class="action-buttons">
                    <button class="btn-action deposit" onclick="openDeposit('BTC')">Deposit</button>
                    <button class="btn-action withdraw" onclick="openWithdraw('BTC')">Withdraw</button>
                    <button class="btn-action transfer" onclick="alert('Transfer coming soon')">Transfer</button>
                </div>
            </div>

            <div class="trends-header">
                <h2><svg viewBox="0 0 24 24" width="18" height="18" stroke="var(--brand-yellow)" fill="none" stroke-width="1.8"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg> Market Trends</h2>
                <a href="./markets.html">View All</a>
            </div>
            <div class="trends-grid" id="trends-container"></div>
        </main>
    </div>

    <div class="modal-overlay" id="deposit-modal">
        <div class="modal"><h3>Deposit <span id="deposit-symbol"></span></h3><p>Send only <strong id="deposit-network"></strong> to this address:</p><div class="address-box" id="deposit-address"></div><button class="btn btn-deposit" onclick="copyAddress()">Copy Address</button><div class="btn-row"><button class="btn btn-outline" onclick="closeDeposit()">Close</button></div></div>
    </div>
    <div class="modal-overlay" id="withdraw-modal">
        <div class="modal"><h3>Withdraw <span id="withdraw-symbol"></span></h3><p>Enter the external address and amount:</p><input type="text" id="withdraw-address" placeholder="External address"><input type="number" id="withdraw-amount" placeholder="Amount" step="any"><button class="btn btn-withdraw-modal" onclick="submitWithdrawal()">Withdraw</button><div class="btn-row"><button class="btn btn-outline" onclick="closeWithdraw()">Cancel</button></div></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://clwgengvcdokdzubdfxd.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsd2dlbmd2Y2Rva2R6dWJkZnhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MTIxNjEsImV4cCI6MjA5MzQ4ODE2MX0.0zgizWWXLIHiKdNUAJ3yKaIaxEKsHoFeEIo8IUAMtHU';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;
        let userAssetsMap = {};

        // Sidebar & Particles
        const sidebar = document.getElementById('sidebar');
        if (localStorage.getItem('sidebarCollapsed') === 'true') sidebar.classList.add('collapsed');
        function toggleSidebar() { sidebar.classList.toggle('collapsed'); localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed')); }

        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray = []; const numParticles = 80;
        function setCanvasSize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        setCanvasSize(); window.addEventListener('resize', setCanvasSize);
        class Particle {
            constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.size = Math.random() * 1.8 + 0.4; this.speedX = (Math.random() * 0.8) - 0.4; this.speedY = (Math.random() * 0.8) - 0.4; }
            update() { this.x += this.speedX; this.y += this.speedY; if (this.x < 0) this.x = canvas.width; if (this.x > canvas.width) this.x = 0; if (this.y < 0) this.y = canvas.height; if (this.y > canvas.height) this.y = 0; }
            draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fillStyle = '#D4AF37'; ctx.shadowBlur = 8; ctx.shadowColor = '#D4AF37'; ctx.fill(); }
        }
        function initParticles() { particlesArray = []; for (let i = 0; i < numParticles; i++) particlesArray.push(new Particle()); }
        function animateParticles() { ctx.clearRect(0,0,canvas.width,canvas.height); for (let i = 0; i < particlesArray.length; i++) { particlesArray[i].update(); particlesArray[i].draw(); for (let j = i+1; j < particlesArray.length; j++) { const dx = particlesArray[i].x - particlesArray[j].x; const dy = particlesArray[i].y - particlesArray[j].y; const distance = Math.sqrt(dx*dx + dy*dy); if (distance < 130) { ctx.beginPath(); ctx.strokeStyle = `rgba(212,175,55,${0.15 - distance/866})`; ctx.lineWidth = 0.5; ctx.shadowBlur = 0; ctx.moveTo(particlesArray[i].x, particlesArray[i].y); ctx.lineTo(particlesArray[j].x, particlesArray[j].y); ctx.stroke(); } } } requestAnimationFrame(animateParticles); }
        initParticles(); animateParticles();

        async function loadAllData() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) { window.location.href = './pl.html'; return; }
            currentUser = session.user;
            document.getElementById('user-initials').textContent = (currentUser.email[0] || 'U').toUpperCase();
            document.getElementById('user-fullname').textContent = currentUser.email;
            document.getElementById('user-email-display').textContent = currentUser.email;

            const { data: assets, error } = await supabaseClient
                .from('user_assets')
                .select('*')
                .eq('user_id', currentUser.id)
                .order('asset_symbol', { ascending: true });

            let totalUsd = 0, btcQty = 0;
            userAssetsMap = {};
            if (assets) {
                const prices = {};
                try {
                    const res = await fetch('https://api.coinlore.net/api/tickers/?limit=100');
                    const json = await res.json();
                    json.data.forEach(c => prices[c.symbol] = parseFloat(c.price_usd));
                } catch(e) {}
                assets.forEach(a => {
                    userAssetsMap[a.asset_symbol] = Number(a.quantity);
                    if (a.asset_symbol === 'BTC') btcQty = Number(a.quantity);
                    totalUsd += Number(a.quantity) * (prices[a.asset_symbol] || 0);
                });
            }

            document.getElementById('total-balance').textContent = `$${totalUsd.toFixed(2)}`;
            document.getElementById('btc-holdings').textContent = `${btcQty.toFixed(6)} BTC`;
            loadMarketTrends();
        }

        async function loadMarketTrends() {
            const container = document.getElementById('trends-container');
            container.innerHTML = '<p style="color:var(--text-secondary)">Loading trends...</p>';
            try {
                const res = await fetch('https://api.coinlore.net/api/tickers/?limit=3');
                const json = await res.json();
                const coins = json.data;
                let html = '';
                coins.forEach(coin => {
                    const price = parseFloat(coin.price_usd);
                    const change = parseFloat(coin.percent_change_24h);
                    const changeClass = change >= 0 ? 'positive' : 'negative';
                    const changeSign = change >= 0 ? '+' : '';
                    html += `<div class="trend-card">
                        <div class="coin"><div class="coin-icon">${coin.symbol[0]}</div><span class="coin-name">${coin.symbol}/USDT</span></div>
                        <div class="trend-price">$${price.toFixed(2)}</div>
                        <div class="trend-change ${changeClass}">${changeSign}${change.toFixed(2)}%</div>
                    </div>`;
                });
                container.innerHTML = html;
            } catch(e) { container.innerHTML = '<p style="color:var(--trade-red)">Failed to load trends</p>'; }
        }

        function openDeposit(symbol) {
            document.getElementById('deposit-symbol').textContent = symbol;
            document.getElementById('deposit-network').textContent = { BTC:'Bitcoin', ETH:'Ethereum (ERC20)', SOL:'Solana' }[symbol] || 'Mainnet';
            const address = '0x' + [...Array(40)].map(() => Math.floor(Math.random()*16).toString(16)).join('');
            document.getElementById('deposit-address').textContent = address;
            document.getElementById('deposit-modal').style.display = 'flex';
        }
        function copyAddress() { navigator.clipboard.writeText(document.getElementById('deposit-address').textContent).then(() => alert('Address copied!')); }
        function closeDeposit() { document.getElementById('deposit-modal').style.display = 'none'; }

        function openWithdraw(symbol) {
            document.getElementById('withdraw-symbol').textContent = symbol;
            document.getElementById('withdraw-address').value = '';
            document.getElementById('withdraw-amount').value = '';
            document.getElementById('withdraw-modal').style.display = 'flex';
        }
        function closeWithdraw() { document.getElementById('withdraw-modal').style.display = 'none'; }
        function submitWithdrawal() {
            const symbol = document.getElementById('withdraw-symbol').textContent;
            const address = document.getElementById('withdraw-address').value.trim();
            const amount = parseFloat(document.getElementById('withdraw-amount').value);
            if (!address || isNaN(amount) || amount <= 0) { alert('Invalid input.'); return; }
            if (!userAssetsMap[symbol] || userAssetsMap[symbol] < amount) { alert('Insufficient balance.'); return; }
            alert(`Withdrawal request of ${amount} ${symbol} to ${address} submitted. (Simulated)`);
            closeWithdraw();
        }

        function logout() { supabaseClient.auth.signOut().then(() => window.location.href = './pl.html'); }

        loadAllData();
    </script>
</body>
</html>
