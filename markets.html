<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXNYA | Markets</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-base: #080b0f;
            --bg-elevated: #12161c;
            --bg-hover: #1e2530;
            --brand-yellow: #fcd535;
            --text-primary: #eaecef;
            --text-secondary: #848e9c;
            --border-light: #2b3139;
            --trade-green: #0ecb81;
            --trade-red: #f6465d;
            --sidebar-width: 250px;
            --sidebar-collapsed-width: 70px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-base);
            color: var(--text-primary);
            display: flex;
            min-height: 100vh;
        }

        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .app-container {
            position: relative;
            z-index: 1;
            display: flex;
            width: 100%;
        }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-elevated);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .sidebar.collapsed {
            width: var(--sidebar-collapsed-width);
        }

        .sidebar-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 20px 0 14px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 22px;
            border-bottom: 1px solid var(--border-light);
            transition: color 0.2s;
        }

        .sidebar-toggle:hover {
            color: var(--brand-yellow);
        }

        .sidebar-nav {
            flex: 1;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 10px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .sidebar.collapsed .sidebar-nav a {
            padding: 12px 0;
            justify-content: center;
            gap: 0;
        }

        .sidebar.collapsed .sidebar-nav a .nav-text {
            display: none;
        }

        .sidebar.collapsed .sidebar-nav a .nav-icon {
            font-size: 22px;
            margin: 0;
        }

        .sidebar-nav a:hover,
        .sidebar-nav a.active {
            background: var(--bg-hover);
            color: var(--brand-yellow);
        }

        .sidebar-footer {
            padding: 12px;
            border-top: 1px solid var(--border-light);
            display: flex;
            justify-content: center;
        }

        .main-content {
            flex: 1;
            padding: 30px 35px;
            overflow-y: auto;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .left-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 14px;
        }

        .top-logo {
            height: 38px;
            width: auto;
            filter: drop-shadow(0 2px 8px rgba(252, 213, 53, 0.3));
        }

        .user-info-row {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .avatar {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--brand-yellow), #c99a1a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 20px;
            flex-shrink: 0;
        }

        .user-text {
            display: flex;
            flex-direction: column;
        }

        .profile-name {
            font-weight: 600;
            font-size: 18px;
            line-height: 1.2;
        }

        .user-email {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .right-group {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--text-secondary);
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
        }

        .logout-btn:hover {
            border-color: var(--trade-red);
            color: var(--trade-red);
        }

        .card {
            background: var(--bg-elevated);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .update-time {
            color: var(--text-secondary);
            font-size: 12px;
            margin-bottom: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            text-align: left;
            padding: 10px 8px;
            border-bottom: 1px solid var(--border-light);
        }

        th {
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
        }

        td {
            font-size: 13px;
        }

        .coin-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .coin-icon {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: bold;
            font-size: 11px;
            flex-shrink: 0;
        }

        .price-up {
            color: var(--trade-green);
        }

        .price-down {
            color: var(--trade-red);
        }

        .user-holdings {
            font-size: 12px;
            color: var(--brand-yellow);
        }

        .no-holdings {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .loading-text {
            text-align: center;
            color: var(--text-secondary);
            padding: 20px;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 100;
            }

            .sidebar.collapsed {
                width: 0;
            }

            .main-content {
                padding: 20px 15px;
            }
        }
    </style>
</head>

<body>
    <canvas id="particle-canvas"></canvas>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-toggle" onclick="toggleSidebar()" title="Toggle sidebar">☰</div>
            <nav class="sidebar-nav">
                <a href="./profile.html"><span class="nav-icon">📊</span> <span class="nav-text">Overview</span></a>
                <a href="./live-portfolio.html"><span class="nav-icon">📈</span> <span class="nav-text">Live
                        Portfolio</span></a>
                <a href="#" class="active"><span class="nav-icon">🌐</span> <span class="nav-text">Markets</span></a>
                <a href="#"><span class="nav-icon">🔒</span> <span class="nav-text">Security</span></a>
            </nav>
            <div class="sidebar-footer"></div>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <div class="left-group">
                    <img class="top-logo" src=".//WhatsApp Image 2026-04-03 at 4.24.59 AM.jpeg" alt="EXNYA">
                    <div class="user-info-row">
                        <div class="avatar" id="user-initials">U</div>
                        <div class="user-text">
                            <div class="profile-name" id="user-fullname">Loading...</div>
                            <div class="user-email" id="user-email-display">--</div>
                        </div>
                    </div>
                </div>
                <div class="right-group">
                    <button class="logout-btn" onclick="logout()">🚪 Sign Out</button>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2>All Cryptocurrencies</h2>
                    <span style="color:var(--text-secondary); font-size:12px;">Auto‑refresh every 30s</span>
                </div>
                <div class="update-time" id="update-time">Last updated: --</div>

                <table id="markets-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Price (USD)</th>
                            <th>24h Change</th>
                            <th>Market Cap</th>
                            <th>Volume (24h)</th>
                            <th>Your Holdings</th>
                        </tr>
                    </thead>
                    <tbody id="markets-body">
                        <tr>
                            <td colspan="7" class="loading-text">Loading market data...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = 'https://clwgengvcdokdzubdfxd.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsd2dlbmd2Y2Rva2R6dWJkZnhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MTIxNjEsImV4cCI6MjA5MzQ4ODE2MX0.0zgizWWXLIHiKdNUAJ3yKaIaxEKsHoFeEIo8IUAMtHU';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Sidebar toggle
        const sidebar = document.getElementById('sidebar');
        if (localStorage.getItem('sidebarCollapsed') === 'true') sidebar.classList.add('collapsed');
        function toggleSidebar() { sidebar.classList.toggle('collapsed'); localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed')); }

        // Particles (same as before)
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray = []; const numParticles = 80;
        function setCanvasSize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        setCanvasSize(); window.addEventListener('resize', setCanvasSize);
        class Particle {
            constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.size = Math.random() * 1.8 + 0.4; this.speedX = (Math.random() * 0.8) - 0.4; this.speedY = (Math.random() * 0.8) - 0.4; }
            update() { this.x += this.speedX; this.y += this.speedY; if (this.x < 0) this.x = canvas.width; if (this.x > canvas.width) this.x = 0; if (this.y < 0) this.y = canvas.height; if (this.y > canvas.height) this.y = 0; }
            draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fillStyle = '#D4AF37'; ctx.shadowBlur = 8; ctx.shadowColor = '#D4AF37'; ctx.fill(); }
        }
        function initParticles() { particlesArray = []; for (let i = 0; i < numParticles; i++) particlesArray.push(new Particle()); }
        function animateParticles() { ctx.clearRect(0, 0, canvas.width, canvas.height); for (let i = 0; i < particlesArray.length; i++) { particlesArray[i].update(); particlesArray[i].draw(); for (let j = i + 1; j < particlesArray.length; j++) { const dx = particlesArray[i].x - particlesArray[j].x; const dy = particlesArray[i].y - particlesArray[j].y; const distance = Math.sqrt(dx * dx + dy * dy); if (distance < 130) { ctx.beginPath(); ctx.strokeStyle = `rgba(212,175,55,${0.15 - distance / 866})`; ctx.lineWidth = 0.5; ctx.shadowBlur = 0; ctx.moveTo(particlesArray[i].x, particlesArray[i].y); ctx.lineTo(particlesArray[j].x, particlesArray[j].y); ctx.stroke(); } } } requestAnimationFrame(animateParticles); }
        initParticles(); animateParticles();

        let currentUser = null;
        async function loadUser() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) { window.location.href = './pl.html'; return false; }
            currentUser = session.user;
            const { data: profile } = await supabaseClient.from('profiles').select('first_name,last_name').eq('id', currentUser.id).single();
            const firstName = profile?.first_name || currentUser.email.split('@')[0];
            document.getElementById('user-initials').textContent = firstName.charAt(0).toUpperCase();
            document.getElementById('user-fullname').textContent = firstName;
            document.getElementById('user-email-display').textContent = currentUser.email;
            return true;
        }

        async function fetchAllMarkets() {
            try {
                const response = await fetch('https://api.coinlore.net/api/tickers/?limit=100');
                if (!response.ok) { console.error('CoinLore API error', response.status); return null; }
                const json = await response.json();
                return json.data;
            } catch (err) { console.error('Fetch error:', err); return null; }
        }

        async function getUserHoldings() {
            const { data: assets, error } = await supabaseClient.from('user_assets').select('asset_symbol, quantity').eq('user_id', currentUser.id);
            if (error || !assets) return {};
            const holdingsMap = {};
            assets.forEach(a => { holdingsMap[a.asset_symbol] = Number(a.quantity); });
            return holdingsMap;
        }

        function formatLargeNumber(num) {
            if (num >= 1e12) return (num / 1e12).toFixed(2) + 'T';
            if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(2) + 'K';
            return num.toFixed(2);
        }

        async function updateMarkets() {
            const tbody = document.getElementById('markets-body');
            tbody.innerHTML = '<tr><td colspan="7" class="loading-text">Fetching latest data...</td></tr>';
            const [marketData, userHoldings] = await Promise.all([fetchAllMarkets(), getUserHoldings()]);
            if (!marketData) {
                tbody.innerHTML = '<tr><td colspan="7" class="loading-text" style="color:var(--trade-red)">Failed to load market data. Retrying soon...</td></tr>';
                return;
            }
            let html = '';
            marketData.forEach((coin, index) => {
                const price = parseFloat(coin.price_usd);
                const change = parseFloat(coin.percent_change_24h);
                const marketCap = parseFloat(coin.market_cap_usd);
                const volume = parseFloat(coin.volume24);
                const symbol = coin.symbol;
                const changeClass = change >= 0 ? 'price-up' : 'price-down';
                const changeSign = change >= 0 ? '+' : '';
                const userQty = userHoldings[symbol] || 0;
                const holdingValue = userQty * price;
                const holdingsDisplay = userQty > 0
                    ? `<span class="user-holdings">${userQty.toFixed(4)} <br> $${holdingValue.toLocaleString('en-US', { minimumFractionDigits: 2 })}</span>`
                    : `<span class="no-holdings">—</span>`;
                html += `
                <tr>
                    <td>${index + 1}</td>
                    <td>
                        <div class="coin-info">
                            <div class="coin-icon" style="background:${getCoinColor(symbol)}">${symbol[0]}</div>
                            <span style="font-weight:600;">${coin.name}</span>
                            <span style="color:var(--text-secondary); font-size:11px;">${symbol}</span>
                        </div>
                    </td>
                    <td>$${price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: price < 1 ? 6 : 2 })}</td>
                    <td class="${changeClass}">${changeSign}${change.toFixed(2)}%</td>
                    <td>$${formatLargeNumber(marketCap)}</td>
                    <td>$${formatLargeNumber(volume)}</td>
                    <td>${holdingsDisplay}</td>
                </tr>`;
            });
            tbody.innerHTML = html;
            document.getElementById('update-time').textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
        }

        function getCoinColor(symbol) {
            const colors = { BTC: '#F7931A', ETH: '#627EEA', SOL: '#14F195', USDT: '#26A17B', ADA: '#0033AD', USDC: '#2775CA', XRP: '#0085FF', DOGE: '#C2A633', DOT: '#E6007A' };
            return colors[symbol] || '#555';
        }

        function logout() { supabaseClient.auth.signOut().then(() => window.location.href = './pl.html'); }

        (async () => {
            const loggedIn = await loadUser();
            if (!loggedIn) return;
            await updateMarkets();
            setInterval(updateMarkets, 30000);
        })();
    </script>
</body>

</html>
