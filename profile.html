<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXNYA | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-base: #080b0f;
            --bg-elevated: #12161c;
            --bg-hover: #1e2530;
            --brand-yellow: #fcd535;
            --brand-yellow-hover: #f0b90b;
            --text-primary: #eaecef;
            --text-secondary: #848e9c;
            --trade-green: #0ecb81;
            --trade-red: #f6465d;
            --border-light: #2b3139;
            --font-mono: monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-base);
            color: var(--text-primary);
            display: flex;
            min-height: 100vh;
        }

        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .app-container {
            position: relative;
            z-index: 1;
            display: flex;
            width: 100%;
        }

        .sidebar {
            width: 250px;
            background: var(--bg-elevated);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-light);
            padding: 24px 0;
            display: flex;
            flex-direction: column;
        }

        .sidebar-logo {
            padding: 0 24px 24px;
            border-bottom: 1px solid var(--border-light);
        }

        .sidebar-logo img {
            height: 32px;
        }

        .sidebar-nav {
            flex: 1;
            padding: 20px 12px;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 10px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: 0.2s;
        }

        .sidebar-nav a:hover,
        .sidebar-nav a.active {
            background: var(--bg-hover);
            color: var(--brand-yellow);
        }

        .main-content {
            flex: 1;
            padding: 32px 40px;
            overflow-y: auto;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .user-greeting {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--brand-yellow), #c99a1a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .profile-card {
            background: var(--bg-elevated);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border-light);
            border-radius: 24px;
            padding: 28px;
            margin-bottom: 24px;
        }

        .profile-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .profile-field {
            background: var(--bg-base);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border-light);
        }

        .profile-field label {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .balance-row {
            display: flex;
            justify-content: space-between;
            padding: 16px 0;
            border-bottom: 1px solid var(--border-light);
        }

        .btn-logout {
            background: transparent;
            border: 1px solid var(--border-light);
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            color: var(--text-secondary);
        }
    </style>
</head>

<body>
    <canvas id="particle-canvas"></canvas>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <img src=".//WhatsApp Image 2026-04-03 at 4.24.59 AM.jpeg" alt="EXNYA">
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="active">📊 Overview</a>
                <a href="#">💰 Assets</a>
                <a href="#">📈 Activity</a>
                <a href="#">🔒 Security</a>
            </nav>
        </aside>
        <main class="main-content">
            <div class="top-bar">
                <div class="user-greeting">
                    <div class="avatar" id="user-initials">U</div>
                    <div>
                        <h1 id="welcome-message">Welcome</h1>
                        <p id="user-email">--</p>
                    </div>
                </div>
                <button class="btn-logout" onclick="logout()">🚪 Sign Out</button>
            </div>
            <div class="profile-card">
                <h2>👤 Account Details</h2>
                <div class="profile-grid">
                    <div class="profile-field"><label>Full Name</label><span id="profile-name">--</span></div>
                    <div class="profile-field"><label>Email</label><span id="profile-email">--</span></div>
                    <div class="profile-field"><label>Member Since</label><span id="profile-member">--</span></div>
                </div>
            </div>
            <div class="profile-card">
                <h2>💼 Portfolio (simulated)</h2>
                <div id="balances-container">Loading...</div>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = 'https://clwgengvcdokdzubdfxd.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsd2dlbmd2Y2Rva2R6dWJkZnhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MTIxNjEsImV4cCI6MjA5MzQ4ODE2MX0.0zgizWWXLIHiKdNUAJ3yKaIaxEKsHoFeEIo8IUAMtHU';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ---------- Particle animation (now complete) ----------
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];
        const numParticles = 80;

        function setCanvasSize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        setCanvasSize();
        window.addEventListener('resize', setCanvasSize);

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.8 + 0.4;
                this.speedX = (Math.random() * 0.8) - 0.4;
                this.speedY = (Math.random() * 0.8) - 0.4;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = '#D4AF37';
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#D4AF37';
                ctx.fill();
            }
        }

        function initParticles() {
            particlesArray = [];
            for (let i = 0; i < numParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
                for (let j = i + 1; j < particlesArray.length; j++) {
                    const dx = particlesArray[i].x - particlesArray[j].x;
                    const dy = particlesArray[i].y - particlesArray[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 130) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(212, 175, 55, ${0.15 - distance / 866})`;
                        ctx.lineWidth = 0.5;
                        ctx.shadowBlur = 0;
                        ctx.moveTo(particlesArray[i].x, particlesArray[i].y);
                        ctx.lineTo(particlesArray[j].x, particlesArray[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animateParticles);
        }

        initParticles();
        animateParticles();

        // ---------- Load user profile ----------
        async function loadProfile() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                // Not logged in – redirect to login
                window.location.href = './pl.html';
                return;
            }
            const user = session.user;
            console.log('✅ Logged in as', user.email);

            // Fetch profile from 'profiles' table
            const { data: profile, error } = await supabaseClient
                .from('profiles')
                .select('*')
                .eq('id', user.id)
                .single();

            if (error) {
                console.error('⚠️ Could not fetch profile:', error.message);
                // Show fallback data
                document.getElementById('profile-name').textContent = user.email;
                document.getElementById('profile-email').textContent = user.email;
                document.getElementById('profile-member').textContent = '—';
                document.getElementById('user-initials').textContent = user.email.charAt(0).toUpperCase();
                document.getElementById('welcome-message').textContent = 'Welcome';
                document.getElementById('user-email').textContent = user.email;
            } else if (profile) {
                const fullName = `${profile.first_name} ${profile.last_name}`.trim();
                document.getElementById('user-initials').textContent = profile.first_name.charAt(0).toUpperCase();
                document.getElementById('welcome-message').textContent = `Welcome, ${profile.first_name}`;
                document.getElementById('user-email').textContent = profile.email;
                document.getElementById('profile-name').textContent = fullName || '—';
                document.getElementById('profile-email').textContent = profile.email;
                document.getElementById('profile-member').textContent = profile.member_since || '—';
            } else {
                // No profile row yet (unlikely)
                document.getElementById('profile-name').textContent = user.email;
                document.getElementById('profile-email').textContent = user.email;
                document.getElementById('profile-member').textContent = '—';
            }

            // Simulated portfolio
            document.getElementById('balances-container').innerHTML = `
                <div class="balance-row"><span>Bitcoin</span><span>1.2634 BTC</span></div>
                <div class="balance-row"><span>Ethereum</span><span>8.542 ETH</span></div>
                <div class="balance-row"><span>Solana</span><span>45.20 SOL</span></div>
            `;
        }

        loadProfile();

        function logout() {
            supabaseClient.auth.signOut().then(() => {
                window.location.href = './pl.html';
            });
        }
    </script>
</body>

</html>
