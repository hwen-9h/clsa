<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>EXNYA | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Sora:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root{--bg-base:#080b0f;--bg-elevated:#0d1117;--brand-yellow:#fcd535;--text-primary:#e6e9ef;--text-secondary:#5e6a7a;--border-light:#1e2733;--trade-green:#0ecb81;--trade-red:#f6465d;--sidebar-width:240px;}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:var(--bg-base);color:var(--text-primary);display:flex;min-height:100vh;font-family:'DM Sans',sans-serif;font-size:14px;}
        #particle-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:0.45;}
        .app-container{position:relative;z-index:1;display:flex;width:100%;}
        .sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-width);background:var(--bg-elevated);border-right:1px solid var(--border-light);transform:translateX(-100%);transition:transform 0.3s;z-index:100;overflow-y:auto;}
        .sidebar.open{transform:translateX(0);}
        @media (min-width:768px){.sidebar{transform:translateX(0);position:relative;}}
        .sidebar-toggle{display:flex;align-items:center;justify-content:center;padding:16px 0;cursor:pointer;}
        .sidebar-nav{padding:16px 10px;display:flex;flex-direction:column;gap:2px;}
        .sidebar-nav a{display:flex;align-items:center;gap:11px;padding:10px 14px;border-radius:8px;color:var(--text-secondary);text-decoration:none;}
        .sidebar-nav a.active{background:rgba(252,213,53,0.08);color:var(--brand-yellow);}
        .mobile-toggle{position:fixed;top:14px;left:14px;z-index:110;width:38px;height:38px;background:var(--bg-elevated);border:1px solid var(--border-light);border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
        @media (min-width:768px){.mobile-toggle{display:none;}}
        .main-content{flex:1;padding:70px 16px 20px;max-width:100%;}
        @media (min-width:768px){.main-content{padding:28px 32px;max-width:1200px;}}
        .top-bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:24px;}
        .top-logo{height:30px;}
        .user-info-row{display:flex;align-items:center;gap:12px;}
        .avatar{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--brand-yellow),#c9920a);display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;}
        .user-text .profile-name{font-weight:600;font-size:14px;}
        .user-email{font-size:11px;color:var(--text-secondary);}
        .logout-btn{background:transparent;border:1px solid var(--border-light);color:var(--text-secondary);padding:6px 14px;border-radius:7px;cursor:pointer;}
        .card{background:var(--bg-elevated);border-radius:12px;padding:18px;margin-bottom:16px;}
        .card h2{margin-bottom:16px;font-size:16px;display:flex;justify-content:space-between;align-items:center;}
        .refresh-btn{background:transparent;border:1px solid var(--border-light);color:var(--brand-yellow);padding:4px 12px;border-radius:6px;cursor:pointer;font-size:12px;}
        .table-wrapper{overflow-x:auto;}
        table{width:100%;min-width:600px;border-collapse:collapse;}
        th,td{padding:10px 8px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.1);}
        .btn{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:none;margin:2px;}
        .btn-primary{background:var(--brand-yellow);color:#000;}
        .btn-danger{background:var(--trade-red);color:#fff;}
        .btn-outline{background:transparent;border:1px solid var(--border-light);color:var(--text-secondary);}
        .status-badge{padding:2px 8px;border-radius:12px;font-size:11px;}
        .status-pending{background:rgba(252,213,53,0.15);color:var(--brand-yellow);}
        .status-verified{background:rgba(14,203,129,0.15);color:var(--trade-green);}
        .status-rejected{background:rgba(246,70,93,0.15);color:var(--trade-red);}
        .toast{position:fixed;bottom:20px;right:20px;background:var(--bg-elevated);border-left:4px solid var(--trade-green);padding:12px 20px;border-radius:8px;z-index:2000;display:none;max-width:90%;word-break:break-word;}
        .error-banner{background:rgba(246,70,93,0.2);border:1px solid var(--trade-red);border-radius:8px;padding:12px;margin-bottom:16px;color:var(--trade-red);}
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-toggle" onclick="toggleSidebar()"><svg viewBox="0 0 24 24" width="18" height="18"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></div>
            <nav class="sidebar-nav"><a href="./profile.html">Overview</a><a href="#" class="active">Admin</a></nav>
        </aside>
        <div class="mobile-toggle" id="mobile-toggle" onclick="toggleSidebar()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></div>
        <main class="main-content">
            <div class="top-bar">
                <img class="top-logo" src="https://placehold.co/120x40?text=EXNYA" alt="EXNYA">
                <div class="user-info-row"><div class="avatar" id="user-initials">A</div><div class="user-text"><div class="profile-name" id="user-fullname">Admin</div><div class="user-email" id="user-email-display">--</div></div></div>
                <button class="logout-btn" onclick="logout()">Sign Out</button>
            </div>
            <div id="error-container"></div>
            <div class="card"><h2>Admin Panel</h2><div class="table-wrapper"><div id="admin-content">Loading...</div></div></div>
            <div class="card"><h2>KYC Verification Queue <button class="refresh-btn" onclick="loadKYCQueue(true)">⟳ Refresh</button></h2><div class="table-wrapper"><div id="kyc-queue">Loading...</div></div></div>
        </main>
    </div>
    <div id="toast" class="toast"></div>

    <script>
        // Suppress "message channel closed" errors from browser extensions
        window.addEventListener('unhandledrejection', function(event) {
            if (event.reason?.message?.includes('message channel closed') ||
                event.reason?.message?.includes('Listener indicated an asynchronous response')) {
                event.preventDefault();
                return;
            }
        });

        const SUPABASE_URL = 'https://clwgengvcdokdzubdfxd.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsd2dlbmd2Y2Rva2R6dWJkZnhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MTIxNjEsImV4cCI6MjA5MzQ4ODE2MX0.0zgizWWXLIHiKdNUAJ3yKaIaxEKsHoFeEIo8IUAMtHU';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let currentUser = null;
        let allUsers = [];
        let allAssets = [];

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.borderLeftColor = isError ? 'var(--trade-red)' : 'var(--trade-green)';
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 5000);
        }
        function showError(msg) {
            const container = document.getElementById('error-container');
            container.innerHTML = `<div class="error-banner">❌ ${msg}</div>`;
            setTimeout(() => { container.innerHTML = ''; }, 8000);
        }

        // Helper to ensure valid session
        async function ensureValidSession() {
            const { data: { session }, error: refreshError } = await supabaseClient.auth.refreshSession();
            if (refreshError || !session) {
                console.error('Session refresh failed:', refreshError);
                window.location.href = './pl.html';
                return false;
            }
            if (session.user && (!currentUser || currentUser.id !== session.user.id)) {
                currentUser = session.user;
            }
            return true;
        }

        // Particles
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resizeCanvas(); window.addEventListener('resize', resizeCanvas);
        class Particle {
            constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.size = Math.random() * 1.5 + 0.3; this.speedX = (Math.random() - 0.5) * 0.4; this.speedY = (Math.random() - 0.5) * 0.4; }
            update() { this.x += this.speedX; this.y += this.speedY; if (this.x < 0) this.x = canvas.width; if (this.x > canvas.width) this.x = 0; if (this.y < 0) this.y = canvas.height; if (this.y > canvas.height) this.y = 0; }
            draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fillStyle = '#D4AF37'; ctx.fill(); }
        }
        for (let i = 0; i < 60; i++) particles.push(new Particle());
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        animate();

        async function checkAdmin() {
            try {
                const valid = await ensureValidSession();
                if (!valid) return;

                const { data: profile, error: profileError } = await supabaseClient
                    .from('profiles')
                    .select('is_admin, first_name')
                    .eq('id', currentUser.id)
                    .single();

                if (profileError) {
                    console.error('Profile query error:', profileError);
                    showError(`Failed to load admin profile: ${profileError.message}`);
                    document.getElementById('admin-content').innerHTML = '<p style="color:var(--trade-red)">Error loading admin data. Check RLS policies.</p>';
                    return;
                }

                if (!profile || profile.is_admin !== true) {
                    showError('Access denied: You are not an administrator.');
                    document.getElementById('admin-content').innerHTML = '<p style="color:var(--trade-red)">Access denied. You are not an admin.</p>';
                    return;
                }

                document.getElementById('user-fullname').textContent = profile.first_name || 'Admin';
                document.getElementById('user-initials').textContent = (profile.first_name || 'A')[0].toUpperCase();
                document.getElementById('user-email-display').textContent = currentUser.email;

                await loadAdminPanel();
                await loadKYCQueue();
            } catch (err) {
                console.error('Admin check error:', err);
                showError('Unexpected error: ' + err.message);
            }
        }

        async function loadAdminPanel() {
            try {
                const { data: users, error: usersError } = await supabaseClient.from('profiles').select('*');
                if (usersError) throw usersError;
                allUsers = users || [];
                const { data: assets, error: assetsError } = await supabaseClient.from('user_assets').select('*');
                if (assetsError) throw assetsError;
                allAssets = assets || [];
                renderAdmin();
            } catch (err) {
                console.error('Load admin panel error:', err);
                document.getElementById('admin-content').innerHTML = '<p style="color:var(--trade-red)">Failed to load admin panel. Check your RLS policies and stack depth.</p>';
            }
        }

        function renderAdmin() {
            if (!allUsers.length) {
                document.getElementById('admin-content').innerHTML = '<p>No users found.</p>';
                return;
            }
            let html = '<table><thead><tr><th>Email</th><th>Assets</th><th>Actions</th></tr></thead><tbody>';
            allUsers.forEach(user => {
                const userAssets = allAssets.filter(a => a.user_id === user.id);
                html += `<tr>
                    <td>${user.email}</td>
                    <td>${userAssets.map(a => `${a.asset_symbol} (${Number(a.quantity).toFixed(4)})`).join(', ') || 'None'}</td>
                    <td>
                        <button class="btn btn-primary" onclick="openAddAsset('${user.id}')">+ Asset</button>
                        ${userAssets.map(a => `<button class="btn btn-outline" onclick="openEditAsset('${a.id}','${a.asset_symbol}','${Number(a.quantity)}')">Edit ${a.asset_symbol}</button>
                        <button class="btn btn-danger" onclick="deleteAsset('${a.id}')">Del</button>`).join('')}
                    </td>
                </tr>`;
            });
            html += `</tbody></table>`;
            document.getElementById('admin-content').innerHTML = html;
        }

        function openAddAsset(userId) {
            const symbol = prompt('Asset symbol (e.g., BTC):');
            const qty = prompt('Quantity:');
            if (symbol && qty && !isNaN(qty)) {
                supabaseClient.from('user_assets').insert({ user_id: userId, asset_symbol: symbol.toUpperCase(), quantity: parseFloat(qty) })
                    .then(({ error }) => { if (error) alert(error.message); else loadAdminPanel(); });
            }
        }

        function openEditAsset(assetId, oldSymbol, oldQty) {
            const symbol = prompt('Symbol', oldSymbol);
            const qty = prompt('Quantity', oldQty);
            if (symbol && qty && !isNaN(qty)) {
                supabaseClient.from('user_assets').update({ asset_symbol: symbol.toUpperCase(), quantity: parseFloat(qty) }).eq('id', assetId)
                    .then(({ error }) => { if (error) alert(error.message); else loadAdminPanel(); });
            }
        }

        function deleteAsset(assetId) {
            if (confirm('Delete this asset?')) {
                supabaseClient.from('user_assets').delete().eq('id', assetId)
                    .then(({ error }) => { if (error) alert(error.message); else loadAdminPanel(); });
            }
        }

        async function loadKYCQueue() {
            try {
                const { data: pendingUsers, error } = await supabaseClient
                    .from('profiles')
                    .select('*')
                    .eq('kyc_status', 'pending');
                if (error) throw error;
                if (!pendingUsers || pendingUsers.length === 0) {
                    document.getElementById('kyc-queue').innerHTML = '<p>No pending KYC requests.</p>';
                    return;
                }
                let html = '<table><thead><tr><th>Email</th><th>Document</th><th>Actions</th></tr></thead><tbody>';
                for (const user of pendingUsers) {
                    html += `<tr>
                        <td>${user.email}</td>
                        <td>${user.kyc_document_url ? `<button class="btn btn-outline" onclick="viewDocument('${user.kyc_document_url}')">View ID</button>` : 'No file'}</td>
                        <td>
                            <button class="btn btn-primary" onclick="approveKYC('${user.id}')">Approve</button>
                            <button class="btn btn-danger" onclick="rejectKYC('${user.id}')">Reject</button>
                        </td>
                    </tr>`;
                }
                html += `</tbody></table>`;
                document.getElementById('kyc-queue').innerHTML = html;
            } catch (err) {
                console.error('Load KYC error:', err);
                document.getElementById('kyc-queue').innerHTML = '<p style="color:var(--trade-red)">Error loading queue.</p>';
            }
        }

        async function viewDocument(filePath) {
            if (!filePath) { alert('No document available.'); return; }
            const { data, error } = await supabaseClient.storage
                .from('kyc_documents')
                .createSignedUrl(filePath, 300);
            if (error) { alert('Could not generate link: ' + error.message); return; }
            window.open(data.signedUrl, '_blank');
        }

        async function approveKYC(userId) {
            if (!confirm('Approve this user\'s KYC?')) return;
            const { error } = await supabaseClient
                .from('profiles')
                .update({ kyc_status: 'verified' })
                .eq('id', userId);
            if (error) {
                showToast('Error: ' + error.message, true);
                console.error('Approve error:', error);
            } else {
                showToast('KYC approved successfully!');
                await loadKYCQueue();
                await loadAdminPanel();
            }
        }

        async function rejectKYC(userId) {
            if (!confirm('Reject this user\'s KYC?')) return;
            const { error } = await supabaseClient
                .from('profiles')
                .update({ kyc_status: 'rejected' })
                .eq('id', userId);
            if (error) {
                showToast('Error: ' + error.message, true);
                console.error('Reject error:', error);
            } else {
                showToast('KYC rejected.');
                await loadKYCQueue();
                await loadAdminPanel();
            }
        }

        function logout() {
            supabaseClient.auth.signOut().then(() => window.location.href = './pl.html');
        }

        checkAdmin();
    </script>
</body>
</html>
